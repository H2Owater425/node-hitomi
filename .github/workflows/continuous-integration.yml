name: Continuous integration

on:
  workflow_dispatch:

  push:
    branches:
      - main

    paths:
      - 'source/**'
      - 'test/**'
      - 'package.json'

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

    paths:
      - 'source/**'
      - 'test/**'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 'Static checks'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  test:
    name: 'Test (${{ matrix.node-version }})'
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '14'
          - '16'
          - '18'
          - '20'
          - '22'
          - '24'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        if: matrix.node-version == '14'
        run: npm install

      - name: Install dependencies
        if: matrix.node-version != '14'
        run: npm ci

      - name: Run unit tests
        run: npm run test